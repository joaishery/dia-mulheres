<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para minha mãe 💐</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(180deg,#ffe4ef 0%,#fff7fb 100%);
overflow:hidden;
}

.hearts span{
position:absolute;
bottom:-40px;
font-size:20px;
animation:subir linear infinite;
opacity:0.75;
}

@keyframes subir{
from{transform:translateY(0) scale(1);opacity:0.8;}
to{transform:translateY(-110vh) scale(1.3);opacity:0;}
}

.card{
position:relative;
width:min(92vw,700px);
background:rgba(255,255,255,0.9);
border:2px solid #ffd1e4;
border-radius:28px;
box-shadow:0 18px 50px rgba(222,92,145,0.18);
padding:28px 24px 32px;
text-align:center;
z-index:2;
}

.message{
margin:0 auto 20px;
max-width:560px;
background:#fff5fa;
border:1px dashed #f3a8c6;
border-radius:18px;
padding:18px;
color:#7a4760;
line-height:1.7;
font-size:18px;
}

.bonequinho{
  width: 220px;
  margin: 15px auto;
  display: block;
  border-radius: 15px;
}

.btn{
border:none;
border-radius:999px;
padding:14px 22px;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:transform .15s ease, box-shadow .15s ease;
margin:6px;
}

.btn:hover{
transform:translateY(-2px);
box-shadow:0 8px 18px rgba(217,77,138,0.2);
}

.btn-main{
background:#ff75ae;
color:white;
}

.btn-second{
background:white;
color:#d94d8a;
border:2px solid #ffc2da;
}

.hidden-message{
margin-top:18px;
display:none;
font-size:22px;
color:#cc3f7c;
font-weight:bold;
}

.footer{
margin-top:18px;
color:#9b6a82;
font-size:14px;
}

</style>
</head>

<body>

<div class="hearts">
<span style="left:6%; animation-duration:10s;">💗</span>
<span style="left:15%; animation-duration:13s;">🌸</span>
<span style="left:24%; animation-duration:11s;">💖</span>
<span style="left:34%; animation-duration:15s;">🌷</span>
<span style="left:46%; animation-duration:12s;">💞</span>
<span style="left:57%; animation-duration:14s;">🌹</span>
<span style="left:68%; animation-duration:10s;">💕</span>
<span style="left:79%; animation-duration:16s;">💐</span>
<span style="left:90%; animation-duration:12s;">💓</span>
</div>

<main class="card">

<div class="message">
Nesse dia tão especial, eu queria te entregar esta linda flor  
enquanto você escuta essa bela música.  
Espero que seu dia tenha sido tão incrível quanto você! ❤️
</div>

<!-- VIDEO -->
<video class="bonequinho" autoplay loop muted playsinline>
<source src="bonequinho.mp4" type="video/mp4">
</video>

<button class="btn btn-main" onclick="mostrarMensagem()">Apertar com carinho 💌</button>

<button class="btn btn-second" onclick="tocarMusica()">Tocar música 🎵</button>

<div id="mensagemExtra" class="hidden-message">
Feliz dia das mulheres, voce é muito especial! 🤗
</div>

<audio id="musica">
<source src="musicamp3.mp3" type="audio/mpeg">
</audio>

</main>

<script>

function mostrarMensagem(){
const msg=document.getElementById("mensagemExtra");
msg.style.display="block";
}

function tocarMusica(){
const audio=document.getElementById("musica");
audio.play();
}

</script>

</body>
</html>
